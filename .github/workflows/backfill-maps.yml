name: Backfill Maps Check-Ins (one-shot)

# Manual trigger only. After successful run + verification, delete this workflow
# and automation/backfill_maps.py to keep the repo clean.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill
        env:
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_CLIENT_SECRET: ${{ secrets.SF_CLIENT_SECRET }}
        run: python -m automation.backfill_maps

      - name: Commit snapshots
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/snapshots/
          if git diff --cached --quiet; then
            echo "No new snapshot files — nothing to commit."
          else
            git commit -m "Backfill Maps check-ins for past months"
            git push
          fi
