name: Update OSR Dashboards

on:
  schedule:
    # Hourly 5 AM – 6 PM PST (1 PM – 2 AM UTC) weekdays
    # 1 PM – 11 PM UTC = Mon-Fri
    - cron: '0 13-23 * * 1-5'
    # 12 AM – 2 AM UTC = Tue-Sat (still PST weekday evening)
    - cron: '0 0-2 * * 2-6'
  workflow_dispatch:
    # Manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update-dashboards:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dashboard update
        env:
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_CLIENT_SECRET: ${{ secrets.SF_CLIENT_SECRET }}
          GENESYS_CLIENT_ID: ${{ secrets.GENESYS_CLIENT_ID }}
          GENESYS_CLIENT_SECRET: ${{ secrets.GENESYS_CLIENT_SECRET }}
          GENESYS_REGION: ${{ secrets.GENESYS_REGION }}
        run: python -m automation.main

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add *.html data/snapshots/
          git commit -m "Auto-update dashboards $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
