<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cohort Commission Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B0F1A;color:#E2E8F0;font-family:'Segoe UI',system-ui,sans-serif;padding:20px;max-width:1200px;margin:0 auto}
a{color:#F59E0B;text-decoration:none}a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:20px;font-size:14px;color:#64748B}.back:hover{color:#F59E0B}
.hdr{text-align:center;margin-bottom:24px}
.hdr h1{font-size:32px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px}
.sub{color:#64748B;font-size:14px;margin-top:8px}

.tabs{display:flex;gap:8px;margin-bottom:24px;justify-content:center}
.tab{padding:10px 24px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;border:1px solid #1E293B;background:#111827;color:#94A3B8;transition:all .15s}
.tab:hover{border-color:#F59E0B;color:#E2E8F0}
.tab.active{background:#F59E0B;border-color:#F59E0B;color:#0B0F1A}
.tab .tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:6px;text-transform:uppercase}
.tab.active .tag{background:rgba(0,0,0,.2)}
.tab:not(.active) .tag{background:#1E293B}
.tab-dim{opacity:.5;border-style:dashed}
.tab-dim:hover{opacity:.8}
.tab-dim.active{opacity:1;border-style:solid;background:#64748B;border-color:#64748B}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi{background:#111827;border:1px solid #1E293B;border-radius:12px;padding:16px;text-align:center}
.kpi-l{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#64748B;margin-bottom:6px;font-weight:600}
.kpi-v{font-size:28px;font-weight:700}
.kpi-s{font-size:12px;color:#475569;margin-top:4px}

.note{text-align:center;color:#475569;font-size:12px;margin-bottom:20px;padding:8px;background:#111827;border:1px solid #1E293B;border-radius:8px}
.note b{color:#F59E0B}

.card{background:#111827;border:1px solid #1E293B;border-radius:14px;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:#F59E0B33}
.card-h{padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:16px}
.rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.rank-g{background:#10B981;color:#0B0F1A}.rank-o{background:#F59E0B;color:#0B0F1A}.rank-b{background:#3B82F6;color:#fff}.rank-d{background:#1E293B;color:#64748B}
.info{flex:1;min-width:0}
.name{font-size:16px;font-weight:600;margin-bottom:4px}
.meta{font-size:12px;color:#64748B;display:flex;gap:16px;flex-wrap:wrap}
.total-v{font-size:22px;font-weight:700;flex-shrink:0;text-align:right;min-width:100px}
.total-v span{display:block;font-size:11px;color:#64748B;font-weight:500;text-transform:uppercase;letter-spacing:.04em}

.prog-row{margin:8px 20px 12px;position:relative}
.prog-bar{background:#1E293B;border-radius:6px;height:24px;overflow:visible;position:relative}
.prog-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;min-width:40px;position:relative;z-index:1}
.prog-target{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:#475569;z-index:0}
.trueup{font-size:11px;color:#F59E0B;margin-top:4px;text-align:right;padding:0 20px 8px}

.stops{display:none;border-top:1px solid #1E293B}
.card.open .stops{display:block}
.hint{text-align:center;padding:0 20px 10px;font-size:12px;color:#475569}
.card.open .hint{display:none}

.stop{padding:8px 20px;border-bottom:1px solid #0B0F1A;display:flex;gap:12px;align-items:center;font-size:13px}
.stop:last-child{border:none}
.stop:hover{background:#0F172A}
.stop-name{flex:1;font-weight:500}
.stop-val{min-width:70px;text-align:right;font-weight:600}
.stop-total{min-width:80px;text-align:right;font-weight:700}
.stop-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.badge-prod{background:rgba(16,185,129,.15);color:#10B981}
.badge-zero{background:rgba(100,116,139,.1);color:#475569}

.footer{text-align:center;color:#334155;font-size:12px;margin-top:32px;padding:16px 0}
@media(max-width:768px){.kpis{grid-template-columns:repeat(2,1fr)}.card-h{flex-wrap:wrap;gap:10px}}
</style></head><body>

var cohortConfig=[{"id":"feb","label":"Feb → Mar","varName":"febCohort","type":"active","note":"<div class=\"note\"><b>Active cohort</b> &mdash; February enrollees must produce $15K by end of March (M0+M1). Miss? $30K by end of April (M2 true-up).</div>","monthKeys":["feb","mar"],"monthLabels":["Feb $","Mar $"],"hasM2":false,"deadline":"March (M1 in progress)","deadlineSub":"25 days remaining"},{"id":"jan","label":"Jan → Feb","varName":"janCohort","type":"baseline","note":"<div class=\"note\"><b>Baseline cohort (pre-commission structure)</b> &mdash; January cohort tracked retroactively. Month 2 true-up: $30K by end of March.</div>","monthKeys":["jan","feb","mar"],"monthLabels":["Jan $","Feb $","Mar $"],"hasM2":true,"deadline":"February (M1 complete)","deadlineSub":"M1 closed, M2 true-up available"}];

function render(){

var cohort=window[cfg.varName];
var target=15000;

var totalFunded=0,totalProducing=0,totalMerchants=0,atTarget=0;

kh+='<div class="kpi"><div class="kpi-l">Deadline</div><div class="kpi-v" style="color:#8B5CF6;font-size:16px">'+cfg.deadline+'</div><div class="kpi-s">'+cfg.deadlineSub+'</div></div>';

var h='';
for(var i=0;i<cohort.length;i++){

var pct=Math.min(o.f/target*100,100);
var pctDisplay=Math.round(o.f/target*100);
var color=o.f>=target?'#10B981':o.f>=target*.5?'#F59E0B':o.f>0?'#3B82F6':'#475569';
var rankClass=o.f>=target?'rank-g':o.f>=target*.5?'rank-o':o.f>0?'rank-b':'rank-d';

h+='<div class="card" onclick="tog(this)">';
h+='<div class="card-h">';

else h+='<span>Need '+fmt(target-o.f)+' more</span>';

h+='<div class="total-v" style="color:'+color+'">'+fmt(o.f)+'<span>'+pctDisplay+'% of $15K</span></div>';
h+='</div>';

var showInside=pctDisplay>=100;
h+='<div class="prog-row"><div class="prog-bar">';
h+='<div class="prog-fill" style="width:'+Math.min(pct,100)+'%;background:'+color+'">'+(showInside?pctDisplay+'% of target':'')+'</div>';
if(!showInside) h+='<div class="prog-target">$15K target</div>';
h+='</div></div>';

if(cfg.hasM2 && o.f<target && o.f2!==undefined){
var lastKey=cfg.monthKeys[cfg.monthKeys.length-1];
var lastLabel=cfg.monthLabels[cfg.monthLabels.length-1].replace(' $','');
h+='<div class="trueup">Month 2 true-up: '+fmt(o.f2)+' / $30K ('+(Math.round(o.f2/30000*100))+'%) &mdash; '+lastLabel+' so far: '+fmt(o[lastKey])+'</div>';
}

h+='<div class="hint">Click to see '+o.s.length+' merchants</div>';
h+='<div class="stops">';

h+='<div class="stop" style="font-weight:600;color:#64748B;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #1E293B">';
h+='<div class="stop-name">Merchant</div>';
for(var k=0;k<cfg.monthLabels.length;k++) h+='<div class="stop-val">'+cfg.monthLabels[k]+'</div>';
h+='<div class="stop-total">Total</div></div>';

for(var j=0;j<o.s.length;j++){
var s=o.s[j];
var badge=s.t>0?'<span class="stop-badge badge-prod">Producing</span>':'<span class="stop-badge badge-zero">$0</span>';
h+='<div class="stop">';
h+='<div class="stop-name">'+s.n+' '+badge+'</div>';
for(var k=0;k<cfg.monthKeys.length;k++){
var mk=cfg.monthKeys[k];
h+='<div class="stop-val">'+(s[mk]>0?fmt(s[mk]):'-')+'</div>';
}
h+='<div class="stop-total" style="color:'+(s.t>0?'#10B981':'#475569')+'">'+fmt(s.t)+'</div>';
h+='</div>';
}
h+='</div></div>';
}
document.getElementById('cards').innerHTML=h;
}

render();
