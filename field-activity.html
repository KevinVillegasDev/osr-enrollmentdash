<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EasyPay Field Activity Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B0F1A;color:#E2E8F0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;padding:20px;max-width:1200px;margin:0 auto}
a{color:#06B6D4;text-decoration:none}
a:hover{text-decoration:underline}

.back-link{display:inline-block;margin-bottom:20px;font-size:14px;color:#64748B}
.back-link:hover{color:#06B6D4}

.header{text-align:center;margin-bottom:32px}
.header h1{font-size:32px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px}
.header-badge{display:inline-block;background:#06B6D4;color:#0B0F1A;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;margin-left:8px;vertical-align:middle}
.header-sub{color:#64748B;font-size:14px;margin-top:8px}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.kpi-card{background:#111827;border:1px solid #1E293B;border-radius:12px;padding:16px;text-align:center}
.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#64748B;margin-bottom:6px;font-weight:600}
.kpi-value{font-size:28px;font-weight:700}
.kpi-sub{font-size:12px;color:#475569;margin-top:4px}

.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{background:#1E293B;border:1px solid #334155;color:#94A3B8;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.filter-btn:hover{border-color:#06B6D4;color:#E2E8F0}
.filter-btn.active{background:#06B6D4;border-color:#06B6D4;color:#0B0F1A;font-weight:600}

.rep-card{background:#111827;border:1px solid #1E293B;border-radius:14px;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.rep-card:hover{border-color:#1E40AF}
.rep-header{padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:16px}
.rep-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.rank-1{background:#F59E0B;color:#0B0F1A}
.rank-2{background:#94A3B8;color:#0B0F1A}
.rank-3{background:#CD7F32;color:#0B0F1A}
.rank-n{background:#1E293B;color:#64748B}
.rep-info{flex:1;min-width:0}
.rep-name{font-size:16px;font-weight:600;margin-bottom:4px}
.rep-meta{font-size:12px;color:#64748B;display:flex;gap:16px;flex-wrap:wrap}
.rep-total{font-size:22px;font-weight:700;color:#06B6D4;flex-shrink:0;text-align:right;min-width:80px}
.rep-total span{display:block;font-size:11px;color:#64748B;font-weight:500;text-transform:uppercase;letter-spacing:.04em}

.split-bar{height:6px;border-radius:3px;background:#1E293B;margin:8px 20px 0;display:flex;overflow:hidden}
.split-existing{background:#3B82F6;border-radius:3px 0 0 3px}
.split-prospect{background:#F59E0B;border-radius:0 3px 3px 0}

.daily-bars{display:flex;gap:6px;padding:8px 20px 12px;align-items:flex-end}
.daily-bar-wrap{flex:1;text-align:center}
.daily-bar{background:#1E293B;border-radius:4px;position:relative;min-height:4px;margin:0 auto;width:80%;transition:height .3s}
.daily-bar-fill{position:absolute;bottom:0;left:0;right:0;border-radius:4px;transition:height .3s}
.daily-bar-label{font-size:10px;color:#475569;margin-top:4px}
.daily-bar-count{font-size:11px;font-weight:600;color:#94A3B8;margin-bottom:3px}

.rep-stops{display:none;border-top:1px solid #1E293B}
.rep-card.expanded .rep-stops{display:block}
.expand-hint{text-align:center;padding:0 20px 12px;font-size:12px;color:#475569}
.rep-card.expanded .hint-closed{display:none}
.rep-card:not(.expanded) .hint-open{display:none}

.stop-row{padding:10px 20px;border-bottom:1px solid #0B0F1A;display:flex;gap:12px;align-items:flex-start;transition:background .1s}
.stop-row:hover{background:#0F172A}
.stop-row:last-child{border-bottom:none}
.stop-date{font-size:11px;color:#475569;min-width:56px;flex-shrink:0;padding-top:2px}
.stop-type{flex-shrink:0;padding-top:1px}
.stop-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em}
.badge-existing{background:rgba(59,130,246,.15);color:#60A5FA}
.badge-prospect{background:rgba(245,158,11,.15);color:#FBBF24}
.stop-content{flex:1;min-width:0}
.stop-name{font-size:14px;font-weight:600;margin-bottom:2px}
.stop-loc{font-size:12px;color:#64748B;margin-bottom:4px}
.stop-comment{font-size:13px;color:#94A3B8;line-height:1.5;max-height:60px;overflow:hidden;transition:max-height .3s;cursor:pointer}
.stop-comment.open{max-height:2000px}
.stop-comment-toggle{font-size:11px;color:#06B6D4;cursor:pointer;margin-top:2px;display:none}
.stop-comment.long~.stop-comment-toggle{display:inline-block}

.legend{display:flex;gap:20px;justify-content:center;margin-bottom:24px;font-size:12px;color:#64748B}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:2px}

.calendar-row{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;align-items:flex-start}
.calendar-wrap{flex:1;min-width:280px}
.calendar{background:#111827;border:1px solid #1E293B;border-radius:12px;padding:16px;user-select:none}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-size:15px;font-weight:700;color:#E2E8F0;letter-spacing:-0.01em}
.cal-nav{background:none;border:1px solid #334155;color:#94A3B8;width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.cal-nav:hover{border-color:#06B6D4;color:#E2E8F0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-label{text-align:center;font-size:10px;font-weight:600;color:#475569;padding:4px 0;text-transform:uppercase;letter-spacing:.06em}
.cal-day{text-align:center;padding:6px 2px;border-radius:8px;font-size:13px;color:#475569;cursor:pointer;position:relative;transition:all .15s}
.cal-day:empty{cursor:default}
.cal-day:not(:empty):hover{background:#1E293B;color:#94A3B8}
.cal-day.has-data{color:#E2E8F0;font-weight:600}
.cal-day.has-data:hover{background:#1E293B;color:#E2E8F0}
.cal-day.active{background:#06B6D4;color:#0B0F1A;font-weight:700}
.cal-day.active:hover{background:#22D3EE}
.cal-day.today{box-shadow:inset 0 0 0 1.5px #334155}
.cal-dot{width:4px;height:4px;border-radius:50%;background:#06B6D4;margin:2px auto 0;opacity:.7}
.cal-day.active .cal-dot{background:#0B0F1A}
.cal-count{font-size:9px;color:#06B6D4;margin-top:1px;line-height:1}
.cal-day.active .cal-count{color:#0B0F1A}
.cal-all-btn{display:block;width:100%;margin-top:10px;padding:8px;background:#1E293B;border:1px solid #334155;color:#94A3B8;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;text-align:center}
.cal-all-btn:hover{border-color:#06B6D4;color:#E2E8F0}
.cal-all-btn.active{background:#06B6D4;border-color:#06B6D4;color:#0B0F1A}
.type-filters{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start}
.cal-day.in-range{background:rgba(6,182,212,.12);border-radius:4px;color:#94A3B8}
.cal-day.in-range:hover{background:#164E63;color:#E2E8F0}
.cal-day.in-range.has-data{background:#164E63;color:#E2E8F0}
.cal-day.in-range.has-data:hover{background:#1E6E8A}
.cal-status{font-size:11px;text-align:center;margin-top:8px;min-height:16px;color:#64748B}

.footer{text-align:center;color:#334155;font-size:12px;margin-top:32px;padding:16px 0}

@media(max-width:768px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .rep-header{flex-wrap:wrap;gap:10px}
  .rep-total{text-align:left}
  .rep-meta{gap:8px}
  .stop-row{flex-wrap:wrap}
  .daily-bars{padding:8px 12px 12px}
}
</style>
</head>
<body>

<a href="index.html" class="back-link">&larr; Back to Dashboard Hub</a>

<div class="header">
  <h1>Field Activity <span class="header-badge">This Month</span></h1>
  <div class="header-sub">Maps check-ins &middot; No data</div>
</div>

<div class="kpi-row">
  <div class="kpi-card">
    <div class="kpi-label">Total Stops</div>
    <div class="kpi-value" style="color:#06B6D4">0</div>
    <div class="kpi-sub">0.0 avg / day</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">Existing Merchants</div>
    <div class="kpi-value" style="color:#3B82F6">0</div>
    <div class="kpi-sub">0% of stops</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">Prospects</div>
    <div class="kpi-value" style="color:#F59E0B">0</div>
    <div class="kpi-sub">0% of stops</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">Reps Active</div>
    <div class="kpi-value" style="color:#10B981">0</div>
    <div class="kpi-sub">0.0 avg stops / rep</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#3B82F6"></div>Existing Merchant</div>
  <div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div>Prospect / Lead</div>
</div>

<div class="calendar-row">
  <div class="calendar-wrap">
    <div class="calendar">
      <div class="cal-header">
        <button class="cal-nav" onclick="calNav(-1)">&lsaquo;</button>
        <div class="cal-title" id="calTitle"></div>
        <button class="cal-nav" onclick="calNav(1)">&rsaquo;</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <button class="cal-all-btn active" id="calAllBtn" onclick="setFilter('all')">All Days</button>
      <div class="cal-status" id="calStatus"></div>
    </div>
  </div>
  <div class="type-filters">
    <button class="filter-btn active" onclick="setType('all')">All Types</button>
    <button class="filter-btn" onclick="setType('existing')">Existing</button>
    <button class="filter-btn" onclick="setType('prospect')">Prospect</button>
  </div>
</div>

<div id="repCards"></div>

<div class="footer">EasyPay Finance &middot; Field Activity Tracker &middot; Data from Salesforce Maps</div>

<script>
var repActivity=[];
var repStops={};
var rangeStart=null;
var rangeEnd=null;
var typeFilter='all';
var days=[];
var dayLabels={};

// ── Calendar state ──────────────────────────────────────────
var calYear, calMonth;
(function initCal(){
  if(days.length){
    var p=days[0].split('/');
    calMonth=parseInt(p[0])-1;
    calYear=parseInt(p[2]);
  } else {
    var now=new Date();
    calMonth=now.getMonth();
    calYear=now.getFullYear();
  }
})();

function parseDate(s){
  var p=s.split('/');
  return new Date(parseInt(p[2]),parseInt(p[0])-1,parseInt(p[1]));
}

function isInRange(dateStr){
  if(!rangeStart) return true;
  if(!rangeEnd) return dateStr===rangeStart;
  var d=parseDate(dateStr),s=parseDate(rangeStart),e=parseDate(rangeEnd);
  return d>=s&&d<=e;
}

// Count total stops per date across all reps
function getStopCountsByDate(){
  var counts={};
  for(var rep in repStops){
    var stops=repStops[rep];
    for(var i=0;i<stops.length;i++){
      var d=stops[i].d;
      counts[d]=(counts[d]||0)+1;
    }
  }
  return counts;
}
var stopCounts=getStopCountsByDate();

function renderCalendar(){
  var monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var dayNames=['Su','Mo','Tu','We','Th','Fr','Sa'];

  document.getElementById('calTitle').textContent=monthNames[calMonth]+' '+calYear;

  var first=new Date(calYear,calMonth,1);
  var lastDay=new Date(calYear,calMonth+1,0).getDate();
  var startDow=first.getDay();

  var today=new Date();
  var todayStr=(today.getMonth()+1)+'/'+today.getDate()+'/'+today.getFullYear();

  var g='';
  for(var i=0;i<7;i++) g+='<div class="cal-day-label">'+dayNames[i]+'</div>';
  for(var i=0;i<startDow;i++) g+='<div class="cal-day"></div>';
  for(var d=1;d<=lastDay;d++){
    var dateStr=(calMonth+1)+'/'+d+'/'+calYear;
    var cnt=stopCounts[dateStr]||0;
    var cls='cal-day';
    if(cnt>0) cls+=' has-data';
    if(rangeStart&&!rangeEnd&&dateStr===rangeStart){
      cls+=' active';
    } else if(rangeStart&&rangeEnd){
      if(dateStr===rangeStart||dateStr===rangeEnd) cls+=' active';
      else if(isInRange(dateStr)) cls+=' in-range';
    }
    if(dateStr===todayStr) cls+=' today';
    g+='<div class="'+cls+'" onclick="setFilter(\''+dateStr+'\')">'+d;
    if(cnt>0) g+='<div class="cal-count">'+cnt+'</div>';
    g+='</div>';
  }
  document.getElementById('calGrid').innerHTML=g;

  var allBtn=document.getElementById('calAllBtn');
  if(allBtn){
    allBtn.classList.toggle('active',!rangeStart);
    var totalStops=0;
    for(var k in stopCounts) totalStops+=stopCounts[k];
    allBtn.textContent=!rangeStart?'All Days ('+totalStops+' stops)':'Show All Days';
  }

  var statusEl=document.getElementById('calStatus');
  if(statusEl){
    if(!rangeStart){
      statusEl.textContent='';
    } else if(!rangeEnd){
      statusEl.textContent='Click another day to select a range';
      statusEl.style.color='#06B6D4';
    } else {
      var ss=rangeStart.split('/').slice(0,2).join('/');
      var ee=rangeEnd.split('/').slice(0,2).join('/');
      statusEl.textContent=ss+' \u2013 '+ee;
      statusEl.style.color='#64748B';
    }
  }
}

function calNav(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--}
  if(calMonth>11){calMonth=0;calYear++}
  renderCalendar();
}

function setFilter(f){
  if(f==='all'){
    rangeStart=null;
    rangeEnd=null;
  } else if(!rangeStart||rangeEnd!==null){
    rangeStart=f;
    rangeEnd=null;
  } else {
    if(f===rangeStart){
      rangeStart=null;
      rangeEnd=null;
    } else {
      rangeEnd=f;
      if(parseDate(rangeStart)>parseDate(rangeEnd)){
        var tmp=rangeStart;rangeStart=rangeEnd;rangeEnd=tmp;
      }
    }
  }
  renderCalendar();
  render();
  updateKPIs();
}

function setType(t){
  typeFilter=t;
  document.querySelectorAll('.type-filters button').forEach(function(b){
    var match=b.getAttribute('onclick')||'';
    var val=match.match(/setType\('([^']+)'\)/);
    if(val) b.classList.toggle('active',val[1]===t);
  });
  render();
  updateKPIs();
}

function getFilteredStops(rep){
  var stops=repStops[rep]||[];
  return stops.filter(function(s){
    if(rangeStart!==null&&!isInRange(s.d)) return false;
    if(typeFilter==='existing'&&!s.ex) return false;
    if(typeFilter==='prospect'&&s.ex) return false;
    return true;
  });
}

function getFilteredRep(d){
  var stops=getFilteredStops(d.n);
  var ex=stops.filter(function(s){return s.ex}).length;
  var pr=stops.length-ex;
  var daily={};
  days.forEach(function(day){
    daily[day]=stops.filter(function(s){return s.d===day}).length;
  });
  return {n:d.n,t:stops.length,ex:ex,pr:pr,daily:daily};
}

function updateKPIs(){
  var totalStops=0,totalExisting=0,totalProspect=0,activeReps=0;
  repActivity.forEach(function(d){
    var fd=getFilteredRep(d);
    totalStops+=fd.t;
    totalExisting+=fd.ex;
    totalProspect+=fd.pr;
    if(fd.t>0) activeReps++;
  });
  var exPct=totalStops>0?Math.round(totalExisting/totalStops*100):0;
  var prPct=totalStops>0?Math.round(totalProspect/totalStops*100):0;
  var avgPerRep=activeReps>0?(totalStops/activeReps).toFixed(1):'0';
  var filteredDays={};
  repActivity.forEach(function(d){
    getFilteredStops(d.n).forEach(function(s){filteredDays[s.d]=true});
  });
  var numDays=Math.max(Object.keys(filteredDays).length,1);
  var avgPerDay=(totalStops/numDays).toFixed(1);
  var cards=document.querySelectorAll('.kpi-card');
  if(cards[0]){
    cards[0].querySelector('.kpi-value').textContent=totalStops;
    cards[0].querySelector('.kpi-sub').textContent=avgPerDay+' avg / day';
  }
  if(cards[1]){
    cards[1].querySelector('.kpi-value').textContent=totalExisting;
    cards[1].querySelector('.kpi-sub').textContent=exPct+'% of stops';
  }
  if(cards[2]){
    cards[2].querySelector('.kpi-value').textContent=totalProspect;
    cards[2].querySelector('.kpi-sub').textContent=prPct+'% of stops';
  }
  if(cards[3]){
    cards[3].querySelector('.kpi-value').textContent=activeReps;
    cards[3].querySelector('.kpi-sub').textContent=avgPerRep+' avg stops / rep';
  }
}


function render(){
  var maxDaily=0;
  var filtered=repActivity.map(function(d){return getFilteredRep(d)});
  filtered.sort(function(a,b){return b.t-a.t});
  filtered.forEach(function(d){
    days.forEach(function(day){if(d.daily[day]>maxDaily) maxDaily=d.daily[day]});
  });
  if(maxDaily===0) maxDaily=1;

  var h='';
  for(var i=0;i<filtered.length;i++){
    var d=filtered[i];
    var rankClass=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
    var exPct=d.t>0?(d.ex/d.t*100):0;
    var prPct=100-exPct;

    h+='<div class="rep-card" onclick="toggleRep(this)">';
    h+='<div class="rep-header">';
    h+='<div class="rep-rank '+rankClass+'">'+(i+1)+'</div>';
    h+='<div class="rep-info">';
    h+='<div class="rep-name">'+d.n+'</div>';
    h+='<div class="rep-meta">';
    h+='<span style="color:#3B82F6">'+d.ex+' existing</span>';
    h+='<span style="color:#F59E0B">'+d.pr+' prospect</span>';
    if(d.t>0) h+='<span>'+Math.round(exPct)+'% / '+Math.round(prPct)+'% split</span>';
    h+='</div></div>';
    h+='<div class="rep-total">'+d.t+'<span>stops</span></div>';
    h+='</div>';

    h+='<div class="split-bar">';
    if(d.t>0){
      h+='<div class="split-existing" style="width:'+exPct+'%"></div>';
      h+='<div class="split-prospect" style="width:'+prPct+'%"></div>';
    }
    h+='</div>';

    h+='<div class="daily-bars">';
    days.forEach(function(day){
      var cnt=d.daily[day]||0;
      var barH=Math.max((cnt/maxDaily)*40,2);
      var color=cnt>15?'#06B6D4':cnt>10?'#3B82F6':cnt>0?'#1E40AF':'#1E293B';
      h+='<div class="daily-bar-wrap">';
      h+='<div class="daily-bar-count">'+(cnt||'-')+'</div>';
      h+='<div class="daily-bar" style="height:44px">';
      h+='<div class="daily-bar-fill" style="height:'+barH+'px;background:'+color+'"></div>';
      h+='</div>';
      h+='<div class="daily-bar-label">'+dayLabels[day]+'</div>';
      h+='</div>';
    });
    h+='</div>';

    var stops=getFilteredStops(d.n);
    h+='<div class="expand-hint"><span class="hint-closed">Click to see '+stops.length+' stops</span><span class="hint-open">Click to collapse</span></div>';

    h+='<div class="rep-stops">';
    for(var j=0;j<stops.length;j++){
      var s=stops[j];
      var badge=s.ex?'<span class="stop-badge badge-existing">Existing</span>':'<span class="stop-badge badge-prospect">Prospect</span>';
      var comment=s.c||'';
      var isLong=comment.length>200;
      h+='<div class="stop-row">';
      h+='<div class="stop-date">'+s.d.replace('/2026','')+'</div>';
      h+='<div class="stop-type">'+badge+'</div>';
      h+='<div class="stop-content">';
      h+='<div class="stop-name">'+s.n+'</div>';
      if(s.l) h+='<div class="stop-loc">'+s.l+'</div>';
      if(comment){
        h+='<div class="stop-comment'+(isLong?' long':'')+'" onclick="event.stopPropagation();this.classList.toggle(\'open\')">'+comment+'</div>';
        if(isLong) h+='<span class="stop-comment-toggle" onclick="event.stopPropagation();this.previousElementSibling.classList.toggle(\'open\')">show more</span>';
      }
      h+='</div></div>';
    }
    h+='</div></div>';
  }
  document.getElementById('repCards').innerHTML=h;
}

function toggleRep(el){el.classList.toggle('expanded');}

renderCalendar();
render();
</script>
</body>
</html>
